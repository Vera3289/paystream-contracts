services:
  # Build contracts to WASM
  build:
    build:
      context: .
      target: builder
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry

  # Run tests once
  test:
    build:
      context: .
      target: test
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    command: cargo test

  # Development: re-runs tests on every file save
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app                                    # live source mount
      - cargo-cache:/usr/local/cargo/registry     # persistent registry cache
      - cargo-target:/app/target                  # persistent build cache
    command: cargo watch -x test

volumes:
  cargo-cache:
  cargo-target:
