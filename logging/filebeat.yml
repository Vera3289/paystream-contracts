filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true

processors:
  - add_host_metadata: ~
  - add_fields:
      target: ""
      fields:
        environment: ${ENVIRONMENT:development}

output.elasticsearch:
  hosts: ["${ELASTICSEARCH_HOST:elasticsearch}:9200"]
  index: "paystream-logs-%{+yyyy.MM.dd}"
  username: "${ELASTICSEARCH_USER:}"
  password: "${ELASTICSEARCH_PASSWORD:}"

setup.ilm.enabled: true
setup.ilm.policy_name: "paystream-30d"
setup.ilm.rollover_alias: "paystream-logs"

setup.kibana:
  host: "${KIBANA_HOST:kibana}:5601"

logging.level: warning
