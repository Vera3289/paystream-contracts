name: Contract Testing Framework

on:
  push:
    branches: [main, develop]
    paths:
      - "contracts/stream/src/**"
      - "tests/framework/**"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  contract-tests:
    name: Contract Testing Framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: cargo test -p paystream-stream -- --test-output immediate

      - name: Run stress tests
        run: cargo test -p paystream-stream stress -- --test-output immediate

      - name: Run security tests
        run: cargo test -p paystream-stream security -- --test-output immediate

      - name: Run state transition tests
        run: cargo test -p paystream-stream state_transition -- --test-output immediate

      - name: Run auth/access control tests
        run: cargo test -p paystream-stream auth -- --test-output immediate

      - name: Generate coverage report
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --package paystream-stream --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
