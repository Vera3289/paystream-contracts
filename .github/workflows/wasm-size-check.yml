name: WASM Size Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  WASM_SIZE_BUDGET_KB: 100

permissions:
  contents: read
  pull-requests: write

jobs:
  check-wasm-size:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM contracts
        run: make build-wasm

      - name: Check WASM size
        id: size-check
        run: |
          WASM_FILES=$(find target/wasm32-unknown-unknown/release -name "*.wasm" -type f)
          TOTAL_SIZE=0

          for file in $WASM_FILES; do
            SIZE_BYTES=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file")
            SIZE_KB=$((SIZE_BYTES / 1024))
            FILENAME=$(basename "$file")
            echo "📦 $FILENAME: ${SIZE_KB}KB"
            TOTAL_SIZE=$((TOTAL_SIZE + SIZE_KB))
          done

          BUDGET=${{ env.WASM_SIZE_BUDGET_KB }}
          echo "TOTAL_SIZE=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "BUDGET=$BUDGET" >> $GITHUB_OUTPUT

          if [ $TOTAL_SIZE -gt $BUDGET ]; then
            echo "❌ WASM size ${TOTAL_SIZE}KB exceeds budget ${BUDGET}KB"
            exit 1
          fi
          echo "✅ WASM size ${TOTAL_SIZE}KB within budget ${BUDGET}KB"

      - name: Comment PR with size results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const totalSize = '${{ steps.size-check.outputs.TOTAL_SIZE }}';
            const budget = '${{ steps.size-check.outputs.BUDGET }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### WASM Size Report\n\n📦 **Total Size:** ${totalSize}KB\n📊 **Budget:** ${budget}KB\n\n${totalSize > budget ? '❌ **EXCEEDS BUDGET**' : '✅ **Within Budget**'}`
            });
