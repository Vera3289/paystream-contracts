name: License Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Run all checks: licenses, advisories, bans, sources.
          # Remove individual checks from this list to skip them.
          command: check licenses bans advisories sources
          arguments: --workspace
