name: Fuzz

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  fuzz:
    name: Proptest fuzz claimable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-fuzz-

      - name: Run proptest fuzz (1 000 000 iterations)
        run: cargo test --package paystream-stream-fuzz --bin fuzz_claimable
